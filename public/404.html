<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA redirect: preserve the path by encoding it into the hash
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1).join('/') + '/?p=' + encodeURIComponent(l.pathname.slice(1)).replace(/%2F/g, '/') + (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)).replace(/%2F/g, '/') : '') + l.hash);
  </script>
</head>
<body>Redirecting...</body>
</html>
